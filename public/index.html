<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎵 Audio Converter Pro - Konversi Real-time</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 8px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-area {
            background: rgba(255, 255, 255, 0.08);
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            border-color: #4CAF50;
            background: rgba(76, 175, 80, 0.1);
        }

        .upload-area.dragover {
            border-color: #4CAF50;
            background: rgba(76, 175, 80, 0.2);
        }

        .upload-icon {
            font-size: 48px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 12px;
        }

        .file-info {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            display: none;
        }

        .file-info.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .file-name {
            color: white;
            font-weight: 500;
            word-break: break-all;
        }

        .file-size {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            margin-top: 4px;
        }

        .detection-badge {
            display: inline-block;
            background: rgba(0, 242, 255, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 8px;
            color: #00f2ff;
        }

        select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #btnConvert {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
        }

        #btnConvert:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4);
        }

        #btnConvert:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .progress-section {
            margin-top: 24px;
            display: none;
        }

        .progress-section.show {
            display: block;
        }

        .progress-bar-container {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            overflow: hidden;
            height: 30px;
            position: relative;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            border-radius: 20px;
            transition: width 0.3s ease;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-percent {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 12px;
            font-weight: bold;
            z-index: 1;
        }

        .progress-details {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }

        .status-message {
            margin-top: 16px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
        }

        .status-message.uploading { background: rgba(33, 150, 243, 0.2); color: #42a5f5; }
        .status-message.converting { background: rgba(255, 193, 7, 0.2); color: #ffd54f; }
        .status-message.success { background: rgba(76, 175, 80, 0.2); color: #81c784; }
        .status-message.error { background: rgba(244, 67, 54, 0.2); color: #ef5350; }

        .download-btn {
            margin-top: 16px;
            background: linear-gradient(135deg, #2196F3, #1976D2);
        }

        footer {
            text-align: center;
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Audio Converter Pro</h1>
        <p class="subtitle">Upload → Konversi → Download</p>

        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <p>Klik atau drag & drop file di sini</p>
            <p class="upload-hint">Support: MP3, WAV, FLAC, M4A, OGG (max 500MB)</p>
            <input type="file" id="fileInput" accept="audio/*,video/*" style="display:none">
        </div>

        <div class="file-info" id="fileInfo">
            <div class="file-name" id="fileName"></div>
            <div class="file-size" id="fileSize"></div>
            <div class="detection-badge" id="detectionBadge">-</div>
        </div>

        <select id="targetExt" disabled>
            <option value="mp3">🎵 MP3 (Universal, ukuran kecil)</option>
            <option value="wav">🎶 WAV (Lossless, kualitas terbaik)</option>
            <option value="ogg">🎧 OGG (Open source, balance)</option>
            <option value="m4a">📱 M4A (AAC, kompresi baik)</option>
            <option value="flac">💎 FLAC (Lossless, file besar)</option>
        </select>

        <button id="btnConvert" disabled>🚀 Mulai Konversi</button>

        <div class="progress-section" id="progressSection">
            <div class="progress-bar-container">
                <div class="progress-fill" id="progressFill"></div>
                <div class="progress-percent" id="progressPercent">0%</div>
            </div>
            <div class="progress-details">
                <span id="progressTimemark">00:00:00</span>
                <span id="progressEta">⏳ Menghitung...</span>
            </div>
        </div>

        <div class="status-message" id="statusMessage" style="display: none;"></div>

        <footer>
            🔄 Progress real-time | File otomatis terhapus setelah download
        </footer>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const detectionBadge = document.getElementById('detectionBadge');
        const targetExt = document.getElementById('targetExt');
        const btnConvert = document.getElementById('btnConvert');
        const progressSection = document.getElementById('progressSection');
        const progressFill = document.getElementById('progressFill');
        const progressPercent = document.getElementById('progressPercent');
        const progressTimemark = document.getElementById('progressTimemark');
        const progressEta = document.getElementById('progressEta');
        const statusMessage = document.getElementById('statusMessage');

        let selectedFile = null;
        let currentJobId = null;
        let progressInterval = null;

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.className = `status-message ${type}`;
            statusMessage.style.display = 'block';
        }

        function hideStatus() {
            statusMessage.style.display = 'none';
        }

        function updateProgress(progress, timemark, eta) {
            progressFill.style.width = `${progress}%`;
            progressPercent.textContent = `${Math.floor(progress)}%`;
            if (timemark) progressTimemark.textContent = timemark;
            if (eta && eta > 0) {
                const minutes = Math.floor(eta / 60);
                const seconds = eta % 60;
                progressEta.textContent = `⏱️ Sisa ${minutes}:${seconds.toString().padStart(2, '0')}`;
            } else if (progress > 0 && progress < 100) {
                progressEta.textContent = `⏳ Menghitung estimasi...`;
            }
        }

        async function pollProgress(jobId) {
            if (progressInterval) clearInterval(progressInterval);
            
            progressInterval = setInterval(async () => {
                try {
                    const response = await fetch(`/api/progress/${jobId}`);
                    const data = await response.json();
                    
                    if (data.status === 'not_found') {
                        clearInterval(progressInterval);
                        showStatus('❌ Job expired atau tidak ditemukan', 'error');
                        btnConvert.disabled = false;
                        btnConvert.innerHTML = '🚀 Mulai Konversi';
                        return;
                    }
                    
                    updateProgress(data.progress, data.timemark, data.eta);
                    
                    if (data.status === 'completed') {
                        clearInterval(progressInterval);
                        progressInterval = null;
                        updateProgress(100, data.timemark, 0);
                        showStatus('✅ Konversi selesai! Mengunduh...', 'success');
                        
                        // Auto download
                        setTimeout(() => {
                            window.location.href = `/api/download/${jobId}`;
                        }, 500);
                        
                        // Reset UI setelah download
                        setTimeout(() => {
                            progressSection.classList.remove('show');
                            btnConvert.disabled = false;
                            btnConvert.innerHTML = '🚀 Mulai Konversi';
                            hideStatus();
                        }, 3000);
                    }
                    
                    if (data.status === 'error') {
                        clearInterval(progressInterval);
                        progressInterval = null;
                        showStatus(`❌ Error: ${data.error || 'Konversi gagal'}`, 'error');
                        btnConvert.disabled = false;
                        btnConvert.innerHTML = '🚀 Mulai Konversi';
                        progressSection.classList.remove('show');
                    }
                    
                } catch (error) {
                    console.error('Polling error:', error);
                }
            }, 1000);
        }

        async function startConversion() {
            if (!selectedFile) {
                showStatus('Pilih file dulu!', 'error');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('targetExt', targetExt.value);
            
            showStatus('📤 Uploading file...', 'uploading');
            progressSection.classList.add('show');
            updateProgress(0, '00:00:00', null);
            btnConvert.disabled = true;
            btnConvert.innerHTML = '⏳ Uploading...';
            
            try {
                const response = await fetch('/api/convert', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Upload failed');
                }
                
                currentJobId = data.jobId;
                showStatus('⚙️ Memulai konversi...', 'converting');
                btnConvert.innerHTML = '⏳ Konversi berjalan...';
                
                // Start polling for progress
                pollProgress(currentJobId);
                
            } catch (error) {
                console.error('Conversion error:', error);
                showStatus(`❌ Error: ${error.message}`, 'error');
                btnConvert.disabled = false;
                btnConvert.innerHTML = '🚀 Mulai Konversi';
                progressSection.classList.remove('show');
            }
        }
        
        function handleFileSelect(file) {
            if (!file) return;
            
            selectedFile = file;
            const ext = file.name.split('.').pop().toLowerCase();
            
            fileName.textContent = file.name;
            fileSize.textContent = formatFileSize(file.size);
            detectionBadge.innerHTML = `📄 Detected: .${ext.toUpperCase()}`;
            fileInfo.classList.add('show');
            
            targetExt.disabled = false;
            btnConvert.disabled = false;
        }
        
        // Event listeners
        uploadArea.addEventListener('click', () => fileInput.click());
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                handleFileSelect(e.target.files[0]);
            }
        });
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                handleFileSelect(e.dataTransfer.files[0]);
                fileInput.files = e.dataTransfer.files;
            }
        });
        
        btnConvert.addEventListener('click', startConversion);
        
        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (progressInterval) clearInterval(progressInterval);
        });
    </script>
</body>
</html>
